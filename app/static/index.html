<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Copilot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117; color: #e0e0e0;
            height: 100vh; display: flex; flex-direction: column;
        }
        .header {
            background: #1a1d27; padding: 16px 24px;
            border-bottom: 1px solid #2a2d3a;
            display: flex; align-items: center; gap: 12px;
        }
        .header-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-size: 18px;
        }
        .header-title { font-size: 18px; font-weight: 600; color: #fff; }
        .header-subtitle { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .btn {
            background: transparent; border: 1px solid #374151;
            color: #6b7280; padding: 6px 12px; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { border-color: #6366f1; color: #6366f1; }
        .btn.danger:hover { border-color: #ef4444; color: #ef4444; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #10b981; }
        .status-dot {
            width: 8px; height: 8px; background: #10b981;
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .main { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 320px; background: #1a1d27;
            border-right: 1px solid #2a2d3a;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-section { border-bottom: 1px solid #2a2d3a; }
        .sidebar-header {
            padding: 12px 16px; font-size: 12px;
            font-weight: 600; color: #a78bfa;
            display: flex; align-items: center; gap: 6px;
        }

        /* Upload area */
        .upload-area {
            margin: 0 12px 12px;
            border: 2px dashed #2a2d3a; border-radius: 8px;
            padding: 16px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .upload-area:hover { border-color: #6366f1; }
        .upload-area.dragover { border-color: #6366f1; background: #1e1b4b; }
        .upload-icon { font-size: 24px; margin-bottom: 6px; }
        .upload-text { font-size: 12px; color: #6b7280; }
        .upload-text span { color: #6366f1; }
        .upload-input { display: none; }
        .upload-status {
            margin: 0 12px 12px; padding: 10px 12px;
            border-radius: 6px; font-size: 12px;
            display: none;
        }
        .upload-status.success { background: #052e16; border: 1px solid #10b981; color: #10b981; }
        .upload-status.error { background: #2d1f1f; border: 1px solid #ef4444; color: #fca5a5; }

        /* Charts */
        .chart-tabs {
            display: flex; gap: 4px; padding: 8px 12px;
        }
        .tab-btn {
            flex: 1; background: transparent;
            border: 1px solid #2a2d3a; color: #6b7280;
            padding: 5px 4px; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
        .chart-container { padding: 8px 12px 12px; }
        .chart-img { width: 100%; border-radius: 8px; border: 1px solid #2a2d3a; }
        .chart-loading { text-align: center; padding: 30px; color: #4b5563; font-size: 12px; }

        /* Chat */
        .chat-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message { display: flex; gap: 12px; max-width: 680px; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .avatar {
            width: 30px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
        }
        .avatar.ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .avatar.user { background: #374151; }
        .bubble {
            padding: 10px 14px; border-radius: 12px;
            font-size: 13px; line-height: 1.6; max-width: 580px;
        }
        .bubble.ai { background: #1a1d27; border: 1px solid #2a2d3a; color: #e0e0e0; }
        .bubble.user { background: #6366f1; color: #fff; }
        .bubble.error { background: #2d1f1f; border: 1px solid #ef4444; color: #fca5a5; }
        .bubble h3 { color: #a78bfa; margin: 10px 0 4px; font-size: 13px; }
        .bubble ul { padding-left: 18px; margin: 4px 0; }
        .bubble li { margin: 3px 0; }
        .bubble strong { color: #fff; }
        .memory-badge { font-size: 10px; color: #6b7280; margin-top: 4px; }
        .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing span {
            width: 7px; height: 7px; background: #6366f1;
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .suggestions {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 8px 20px; border-top: 1px solid #2a2d3a;
        }
        .suggestion-btn {
            background: #1a1d27; border: 1px solid #2a2d3a;
            color: #a78bfa; padding: 5px 10px; border-radius: 20px;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .suggestion-btn:hover { background: #6366f1; color: #fff; border-color: #6366f1; }
        .input-area {
            padding: 12px 20px; background: #1a1d27;
            border-top: 1px solid #2a2d3a;
            display: flex; gap: 10px; align-items: flex-end;
        }
        textarea {
            flex: 1; background: #0f1117; border: 1px solid #2a2d3a;
            border-radius: 10px; padding: 10px 14px; color: #e0e0e0;
            font-size: 13px; resize: none; outline: none;
            min-height: 44px; max-height: 120px;
            font-family: inherit; transition: border-color 0.2s;
        }
        textarea:focus { border-color: #6366f1; }
        textarea::placeholder { color: #4b5563; }
        .send-btn {
            width: 44px; height: 44px; background: #6366f1;
            border: none; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: #4f46e5; }
        .send-btn:disabled { background: #374151; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; fill: white; }
        .welcome { text-align: center; padding: 40px 20px; color: #4b5563; }
        .welcome h2 { color: #a78bfa; font-size: 20px; margin-bottom: 8px; }
        .welcome p { font-size: 13px; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">🤖</div>
    <div>
        <div class="header-title">AI Data Copilot</div>
        <div class="header-subtitle">Multi-Agent Network Analysis System</div>
    </div>
    <div class="header-right">
        <div class="status"><div class="status-dot"></div>Online</div>
        <button class="btn" onclick="refreshCharts()">🔄 Charts</button>
        <button class="btn danger" onclick="clearMemory()">🗑 Clear</button>
    </div>
</div>

<div class="main">
    <div class="sidebar">

        <!-- CSV Upload -->
        <div class="sidebar-section">
            <div class="sidebar-header">📁 Upload Data</div>
            <div class="upload-area" id="uploadArea"
                onclick="document.getElementById('csvInput').click()"
                ondragover="handleDragOver(event)"
                ondragleave="handleDragLeave(event)"
                ondrop="handleDrop(event)">
                <div class="upload-icon">📂</div>
                <div class="upload-text">
                    <span>Click to upload</span> or drag & drop<br>CSV files only
                </div>
            </div>
            <input type="file" id="csvInput" class="upload-input"
                accept=".csv" onchange="handleFileUpload(event)">
            <div class="upload-status" id="uploadStatus"></div>
        </div>

        <!-- Charts -->
        <div class="sidebar-section">
            <div class="sidebar-header">📊 Live Charts</div>
            <div class="chart-tabs">
                <button class="tab-btn active" onclick="showChart('traffic', this)">📈 Traffic</button>
                <button class="tab-btn" onclick="showChart('zero', this)">🔴 Zero</button>
                <button class="tab-btn" onclick="showChart('comparison', this)">📊 Compare</button>
            </div>
            <div class="chart-container">
                <div class="chart-loading" id="chartLoading">Loading chart...</div>
                <img class="chart-img" id="chartImg" style="display:none" />
            </div>
        </div>

    </div>

    <!-- Chat -->
    <div class="chat-section">
        <div class="chat-area" id="chatArea">
            <div class="welcome">
                <h2>👋 Welcome to AI Data Copilot</h2>
                <p>Upload a CSV or use sample data.</p>
                <p style="color: #6366f1; font-size: 12px; margin-top: 8px;">🧠 Memory · 📊 Charts · 📁 CSV Upload</p>
            </div>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('Analyze zero traffic cells for last 7 days')">📡 Zero traffic</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Which cells have the highest traffic?')">📈 Highest traffic</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Show cells that recently dropped to zero')">⚠️ Recently dropped</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Give me a full network health report')">🏥 Health report</button>
        </div>

        <div class="input-area">
            <textarea id="queryInput"
                placeholder="Ask about your network data..."
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendQuery()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
    let messageCount = 0;
    let currentChart = 'traffic';

    window.onload = () => loadChart('traffic');

    // ── CSV Upload ──────────────────────────────
    function handleDragOver(e) {
        e.preventDefault();
        document.getElementById('uploadArea').classList.add('dragover');
    }
    function handleDragLeave(e) {
        document.getElementById('uploadArea').classList.remove('dragover');
    }
    function handleDrop(e) {
        e.preventDefault();
        document.getElementById('uploadArea').classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) uploadFile(file);
    }
    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (file) uploadFile(file);
    }

    async function uploadFile(file) {
        const status = document.getElementById('uploadStatus');
        status.style.display = 'block';
        status.className = 'upload-status';
        status.textContent = '⏳ Uploading...';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                status.className = 'upload-status success';
                status.textContent = `✅ Loaded ${data.rows} rows, ${data.cells} cells (${data.date_range})`;
                setTimeout(() => loadChart(currentChart), 500);
                addMessage(`📁 CSV uploaded: ${data.rows} rows across ${data.cells} cells. Date range: ${data.date_range}. You can now analyze this data!`, 'ai');
            } else {
                status.className = 'upload-status error';
                status.textContent = `❌ ${data.error}`;
            }
        } catch (e) {
            status.className = 'upload-status error';
            status.textContent = '❌ Upload failed. Try again.';
        }
    }

    // ── Charts ──────────────────────────────────
    async function loadChart(type) {
        const img = document.getElementById('chartImg');
        const loading = document.getElementById('chartLoading');
        img.style.display = 'none';
        loading.style.display = 'block';
        loading.textContent = 'Loading chart...';

        try {
            const res = await fetch(`/charts/${type}`);
            const data = await res.json();
            if (data.chart) {
                img.src = 'data:image/png;base64,' + data.chart;
                img.style.display = 'block';
                loading.style.display = 'none';
            } else {
                loading.textContent = 'No data available.';
            }
        } catch (e) {
            loading.textContent = 'Failed to load chart.';
        }
    }

    function showChart(type, btn) {
        currentChart = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadChart(type);
    }

    function refreshCharts() { loadChart(currentChart); }

    // ── Chat ────────────────────────────────────
    function formatResponse(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/### (.*?)(\n|$)/g, '<h3>$1</h3>')
            .replace(/- (.*?)(\n|$)/g, '<li>$1</li>')
            .replace(/\n/g, '<br>');
    }

    function addMessage(text, type) {
        const chatArea = document.getElementById('chatArea');
        const welcome = chatArea.querySelector('.welcome');
        if (welcome) welcome.remove();

        messageCount++;
        const div = document.createElement('div');
        div.className = `message ${type === 'error' ? '' : type}`;
        const memoryNote = (type === 'ai' && messageCount > 2)
            ? `<div class="memory-badge">🧠 Using conversation memory</div>` : '';

        div.innerHTML = `
            <div class="avatar ${type === 'error' ? 'ai' : type}">${type === 'user' ? '👤' : '🤖'}</div>
            <div class="bubble ${type}">
                ${type === 'ai' ? formatResponse(text) : text}
                ${type === 'ai' ? memoryNote : ''}
            </div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="avatar ai">🤖</div>
            <div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    async function sendQuery() {
        const input = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const query = input.value.trim();
        if (!query) return;

        addMessage(query, 'user');
        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;
        showTyping();

        try {
            const res = await fetch(
                `/query?query=${encodeURIComponent(query)}&session_id=${sessionId}`,
                { method: 'POST', headers: { 'accept': 'application/json' } }
            );
            const data = await res.json();
            removeTyping();
            if (data.final_output) {
                addMessage(data.final_output, 'ai');
                setTimeout(() => loadChart(currentChart), 500);
            } else {
                addMessage('No response received.', 'error');
            }
        } catch (e) {
            removeTyping();
            addMessage('Error: ' + e.message, 'error');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    async function clearMemory() {
        await fetch(`/clear?session_id=${sessionId}`, { method: 'POST' });
        messageCount = 0;
        document.getElementById('chatArea').innerHTML = `
            <div class="welcome">
                <h2>👋 Memory Cleared!</h2>
                <p>Starting a fresh conversation.</p>
                <p style="color: #6366f1; font-size: 12px; margin-top: 8px;">🧠 Memory · 📊 Charts · 📁 CSV Upload</p>
            </div>`;
    }

    function sendSuggestion(text) {
        document.getElementById('queryInput').value = text;
        sendQuery();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendQuery();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
</script>
</body>
</html>
