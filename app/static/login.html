<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Copilot — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117; color: #e0e0e0;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }
        .container {
            width: 100%; max-width: 400px; padding: 24px;
        }
        .logo {
            text-align: center; margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px; display: flex;
            align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 12px;
        }
        .logo-title { font-size: 22px; font-weight: 700; color: #fff; }
        .logo-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }

        .card {
            background: #1a1d27; border: 1px solid #2a2d3a;
            border-radius: 14px; padding: 28px;
        }

        .tabs {
            display: flex; gap: 4px; margin-bottom: 24px;
            background: #0f1117; border-radius: 8px; padding: 4px;
        }
        .tab {
            flex: 1; padding: 8px; border: none;
            border-radius: 6px; font-size: 13px;
            cursor: pointer; transition: all 0.2s;
            background: transparent; color: #6b7280;
        }
        .tab.active { background: #6366f1; color: #fff; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
        input {
            width: 100%; background: #0f1117;
            border: 1px solid #2a2d3a; border-radius: 8px;
            padding: 10px 14px; color: #e0e0e0;
            font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }

        .submit-btn {
            width: 100%; background: #6366f1;
            border: none; border-radius: 8px;
            padding: 12px; color: #fff;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover { background: #4f46e5; }
        .submit-btn:disabled { background: #374151; cursor: not-allowed; }

        .message {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-top: 14px;
            display: none;
        }
        .message.success { background: #052e16; border: 1px solid #10b981; color: #10b981; }
        .message.error { background: #2d1f1f; border: 1px solid #ef4444; color: #fca5a5; }

        .features {
            margin-top: 24px; display: flex;
            justify-content: center; gap: 16px; flex-wrap: wrap;
        }
        .feature { font-size: 11px; color: #4b5563; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">🤖</div>
        <div class="logo-title">AI Data Copilot</div>
        <div class="logo-sub">Multi-Agent Network Analysis System</div>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login', this)">Sign In</button>
            <button class="tab" onclick="switchTab('register', this)">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password"
                    onkeydown="if(event.key==='Enter') submitLogin()" />
            </div>
            <button class="submit-btn" onclick="submitLogin()">Sign In →</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Choose a password"
                    onkeydown="if(event.key==='Enter') submitRegister()" />
            </div>
            <button class="submit-btn" onclick="submitRegister()">Create Account →</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <div class="features">
        <div class="feature">🧠 Memory per user</div>
        <div class="feature">📊 Live charts</div>
        <div class="feature">📁 CSV upload</div>
        <div class="feature">🔒 Secure login</div>
    </div>
</div>

<script>
    // If already logged in, redirect to app
    if (localStorage.getItem('copilot_user')) {
        window.location.href = '/app';
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        hideMessage();
    }

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = `message ${type}`;
        el.style.display = 'block';
    }

    function hideMessage() {
        document.getElementById('message').style.display = 'none';
    }

    async function submitLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) {
            showMessage('Please fill in all fields.', 'error');
            return;
        }

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('copilot_user', username);
                showMessage('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/app', 800);
            } else {
                showMessage('❌ ' + data.error, 'error');
            }
        } catch (e) {
            showMessage('❌ Connection error. Try again.', 'error');
        }
    }

    async function submitRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) {
            showMessage('Please fill in all fields.', 'error');
            return;
        }

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('✅ Account created! Signing you in...', 'success');
                localStorage.setItem('copilot_user', username);
                setTimeout(() => window.location.href = '/app', 800);
            } else {
                showMessage('❌ ' + data.error, 'error');
            }
        } catch (e) {
            showMessage('❌ Connection error. Try again.', 'error');
        }
    }
</script>
</body>
</html>
